<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Centre Login</title>
<style>
  :root{--brand:#1877f2; --bg:#f0f2f5; --card:#fff; --text:#1c1e21;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg,#eaf2ff 0%, var(--bg) 40%);
    min-height:100vh;
    display:grid;
    place-items:center;
    color:var(--text);
  }
  .container{
    width:100%;
    max-width:420px;
    padding:24px;
    text-align:center;
  }
  .logo{
    font-size:22px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-bottom:24px;
    color:var(--text);
  }
  .logo svg{width:28px;height:28px;}
  .hero{
    margin-bottom:28px;
  }
  .hero svg{width:100%;max-width:320px;height:auto;}
  .card{
    background:var(--card);
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
  }
  .btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:12px 16px;
    border:1px solid #dadde1;
    border-radius:8px;
    background:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    color:var(--text);
  }
